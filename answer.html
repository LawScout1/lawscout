<script>
    const params = new URLSearchParams(window.location.search);
    const question = params.get("q");

    document.getElementById("userQuestion").textContent = question || "No question provided.";

    async function getAnswer() {
        if (!question) {
            document.getElementById("aiAnswer").textContent = "No question provided.";
            return;
        }

        if (typeof gtag === "function") {
            gtag('event', 'ask_question', {
                event_category: 'engagement',
                event_label: question
            });
        }

        try {
            const response = await fetch("https://lawscout-backend-production.up.railway.app/ask", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ question: question })
            });

            const data = await response.json();
            document.getElementById("aiAnswer").innerHTML =
                (data.answer || "No answer returned.").replace(/\n/g, "<br><br>");
        } catch (error) {
            document.getElementById("aiAnswer").textContent = "Error getting response from LawScout.";
        }
    }

    function downloadPDF() {
        const element = document.getElementById("reportContent");

        const options = {
            margin: 0.5,
            filename: 'lawscout-report.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(options).from(element).save();

        if (typeof gtag === "function") {
            gtag('event', 'download_pdf', {
                event_category: 'engagement',
                event_label: question || 'unknown_question'
            });
        }
    }

    getAnswer();
</script>
