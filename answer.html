<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Answer — LawScout</title>

  <link rel="icon" href="public/favicon.ico" />
  <link rel="stylesheet" href="styles.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="navbar">
  <div class="container navbar-inner">
    <a class="logo-area" href="index.html">
      <img src="public/logo.png" class="logo-img">
      <div class="logo">LawScout</div>
    </a>
  </div>
</header>

<main class="page-wrap">
  <div class="container answer-layout">

    <aside class="answer-side">
      <p class="eyebrow">REPORT OVERVIEW</p>
      <div class="answer-pill">Free + Premium</div>

      <ul class="feature-list">
        <li>Issue summary</li>
        <li>Legal principles</li>
        <li>Next steps</li>
        <li>Full premium unlock</li>
      </ul>

      <p id="loading-side">Generating your legal report...</p>
    </aside>

    <section class="answer-main">

      <h1 id="question-title"></h1>

      <div class="preview-card">
        <p id="preview-text">Loading...</p>
      </div>

      <div id="locked-report">
        <h3>Unlock full report (£9.99)</h3>
        <div id="paypal-button-container"></div>
      </div>

      <div id="premium-report" style="display:none;">
        <h2>Legal principles</h2>
        <p id="full-legal-principles"></p>

        <h2>Your situation</h2>
        <p id="full-situation"></p>

        <h2>Next steps</h2>
        <p id="full-next-steps"></p>

        <h2>Risks</h2>
        <p id="full-risks"></p>

        <h2>Important</h2>
        <p id="full-limitation"></p>
      </div>

    </section>

  </div>
</main>

<!-- ✅ PayPal SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=EAsqiAIqlhJZq04gZx6OK20zOsAzBXBSYCQQdh7P2RQGr7HIHPjd609S3QROJQmJOeFvPwzI6SwE2QIk&currency=GBP"></script>

<script>
  const params = new URLSearchParams(window.location.search);
  const question = params.get("q") || "Your legal question";
  document.getElementById("question-title").textContent = question;

  let premiumAnswer = null;

  async function loadAnswer() {
    try {
      const res = await fetch("/api/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ question })
      });

      const data = await res.json();
      premiumAnswer = data.answer;

      document.getElementById("preview-text").textContent =
        premiumAnswer?.preview || "Could not generate preview.";
    } catch (err) {
      console.error(err);
      document.getElementById("preview-text").textContent =
        "Error generating answer.";
    }

    document.getElementById("loading-side").style.display = "none";
  }

  function showPremium() {
    document.getElementById("premium-report").style.display = "block";
    document.getElementById("locked-report").style.display = "none";

    document.getElementById("full-legal-principles").textContent = premiumAnswer.legal_principles;
    document.getElementById("full-situation").textContent = premiumAnswer.situation;
    document.getElementById("full-next-steps").textContent = premiumAnswer.next_steps;
    document.getElementById("full-risks").textContent = premiumAnswer.risks;
    document.getElementById("full-limitation").textContent = premiumAnswer.limitation;
  }

  async function init() {
    await loadAnswer();

    // wait for paypal
    let tries = 0;
    while (!window.paypal && tries < 20) {
      await new Promise(r => setTimeout(r, 200));
      tries++;
    }

    if (!window.paypal) {
      console.error("PayPal failed to load");
      return;
    }

    paypal.Buttons({
      createOrder: async () => {
        const res = await fetch("/api/paypal-create-order", {
          method: "POST"
        });
        const data = await res.json();
        return data.id;
      },

      onApprove: async (data) => {
        const res = await fetch("/api/paypal-capture-order", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ orderID: data.orderID })
        });

        const capture = await res.json();

        if (capture.success) {
          showPremium();
        } else {
          alert("Payment failed");
        }
      },

      onError: (err) => {
        console.error(err);
        alert("PayPal error");
      }

    }).render("#paypal-button-container");
  }

  init();
</script>

</body>
</html>
