<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LawScout Solicitors</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">LawScout</div>
    <nav>
      <a href="./index.html">Home</a>
      <a href="./pricing.html">Pricing</a>
      <a href="./report.html">Reports</a>
      <a href="./solicitors.html">Solicitors</a>
      <a href="./login.html">Login</a>
    </nav>
  </header>

  <main class="wrap">
    <div class="page-header">
      <div>
        <p class="eyebrow">Solicitor referrals</p>
        <h1>Speak to a solicitor</h1>
      </div>
    </div>

    <div class="grid two">
      <div class="card">
        <h2>Areas of law</h2>
        <ul class="list">
          <li>Housing</li>
          <li>Employment</li>
          <li>Family</li>
          <li>Consumer disputes</li>
          <li>Small claims</li>
          <li>Immigration</li>
        </ul>
      </div>

      <div class="card">
        <h2>Request contact</h2>
        <form class="stack-form">
          <label>Name</label>
          <input type="text" placeholder="Your name" />
          <label>Email</label>
          <input type="email" placeholder="you@example.com" />
          <label>Area of law</label>
          <input type="text" placeholder="e.g. Housing" />
          <label>Short summary</label>
          <textarea rows="5" placeholder="Brief summary of your issue"></textarea>
          <button type="button" class="primary-btn">Request solicitor contact</button>
        </form>
        <p class="muted">This is a placeholder front-end form ready for later solicitor referral workflows.</p>
      </div>
    </div>
  </main>
</body>
</html>
