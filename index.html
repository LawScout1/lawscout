<!DOCTYPE html>
<html>
<head>
<title>LawScout</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
<h1>LawScout</h1>
<p>Ask a legal question</p>
<form id="form">
<input id="q" placeholder="e.g. Can my landlord evict me?" required>
<button>Ask</button>
</form>
</div>

<script>
document.getElementById("form").addEventListener("submit", e=>{
e.preventDefault();
localStorage.setItem("question", document.getElementById("q").value);
window.location="answer.html";
});
</script>
</body>
</html>
