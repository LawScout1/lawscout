<!DOCTYPE html>
<html>
<head>
<title>Report</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
<h2 id="q"></h2>

<div id="free"></div>

<div class="locked">
<h3>Full Legal Report 🔒</h3>
<p>Unlock full breakdown, risks, and step-by-step actions.</p>
<div id="paypal-button-container"></div>
</div>

<div id="premium" style="display:none;"></div>
</div>

<script src="https://www.paypal.com/sdk/js?client-id=BAAY3vTY5Q25yYVDXU2Y0R_ngE8fZB_JruGfu4fNAi2_Ye0BXc1mh678M29Jt3NwTKDc770z7zf8rguaFg&currency=GBP"></script>

<script>
const q = localStorage.getItem("question");
document.getElementById("q").innerText = q;

fetch("/api/ask",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({question:q})})
.then(r=>r.json())
.then(d=>{
document.getElementById("free").innerHTML = "<h3>Summary</h3><p>"+d.answer.preview+"</p>";
window.full = d.answer.full;
});

paypal.Buttons({
createOrder:(d,a)=>a.order.create({purchase_units:[{amount:{value:'9.99'}}]}),
onApprove:(d,a)=>a.order.capture().then(()=>{
document.querySelector(".locked").style.display="none";
document.getElementById("premium").style.display="block";
document.getElementById("premium").innerHTML = window.full;
})
}).render('#paypal-button-container');
</script>
</body>
</html>
